name: Package VSIX

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.0.1. Leave empty to skip GitHub Release."
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: encoding-keeper-vsix
          path: "*.vsix"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Encoding Keeper ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: "*.vsix"
          generate_release_notes: true
