name: Package VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: encoding-keeper-vsix
          path: "*.vsix"
